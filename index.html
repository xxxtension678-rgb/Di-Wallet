<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Di-Wallet - Daily Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --border-color: #334155;
            --accent-breakfast: #fbbf24;
            --accent-lunch: #34d399;
            --accent-dinner: #f43f5e;
            --accent-other: #a78bfa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .auth-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .auth-btn:hover {
            opacity: 0.9;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--primary);
        }

        .main-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        h2 {
            font-size: 18px;
            margin-bottom: 16px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            width: 100%;
        }

        select:focus, input:focus {
            border-color: var(--primary);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .category-input {
            border-left: 4px solid var(--primary);
        }
        .cat-breakfast { border-left-color: var(--accent-breakfast); }
        .cat-lunch { border-left-color: var(--accent-lunch); }
        .cat-dinner { border-left-color: var(--accent-dinner); }
        .cat-other { border-left-color: var(--accent-other); }

        .btn-save {
            background: var(--primary);
            color: var(--bg-color);
            font-weight: 700;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
        }

        .btn-save:hover {
            background: var(--primary-hover);
        }

        .history-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .table-container {
            overflow-x: auto;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .bg-breakfast { background: rgba(251, 191, 36, 0.15); color: var(--accent-breakfast); }
        .bg-lunch { background: rgba(52, 211, 153, 0.15); color: var(--accent-lunch); }
        .bg-dinner { background: rgba(244, 63, 94, 0.15); color: var(--accent-dinner); }
        .bg-other { background: rgba(167, 139, 250, 0.15); color: var(--accent-other); }

        .total-box {
            display: flex;
            justify-content: space-between;
            background: var(--bg-color);
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 600;
            border: 1px solid var(--border-color);
        }

        .sync-status {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">
                <span>📊</span> Di-Wallet
            </div>
            <div id="auth-area">
                <button class="auth-btn" onclick="handleAuthClick()">
                    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.79 2.7v2.25h2.9c1.69-1.55 2.69-3.83 2.69-6.58z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.22l-2.9-2.25c-.8.54-1.84.87-3.06.87-2.35 0-4.33-1.58-5.04-3.71H.92v2.32C2.4 15.93 5.48 18 9 18z"/><path fill="#FBBC05" d="M3.96 10.69c-.18-.54-.28-1.12-.28-1.69s.1-1.15.28-1.69V4.99H.92A8.977 8.977 0 0 0 0 9c0 1.47.36 2.89.92 4.16l3.04-2.47z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.4C13.46.98 11.42 0 9 0 5.48 0 2.4 2.07.92 4.99l3.04 2.32c.71-2.13 2.69-3.71 5.04-3.71z"/></svg>
                    Sign in with Google
                </button>
            </div>
        </header>

        <div class="main-card">
            <h2>Add Daily Expense</h2>
            
            <div class="filters">
                <div class="form-group">
                    <label>Year</label>
                    <select id="input-year" onchange="updateDays()"></select>
                </div>
                <div class="form-group">
                    <label>Month</label>
                    <select id="input-month" onchange="updateDays()"></select>
                </div>
            </div>

            <div class="filters" style="grid-template-columns: 1fr;">
                <div class="form-group">
                    <label>Day (ရက်စွဲ)</label>
                    <select id="input-day"></select>
                </div>
            </div>

            <div class="grid-inputs">
                <div class="form-group">
                    <label>Breakfast 🍳</label>
                    <input type="number" id="amt-breakfast" class="category-input cat-breakfast" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Lunch 🍛</label>
                    <input type="number" id="amt-lunch" class="category-input cat-lunch" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Dinner 🍲</label>
                    <input type="number" id="amt-dinner" class="category-input cat-dinner" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Other ⚡</label>
                    <input type="number" id="amt-other" class="category-input cat-other" placeholder="0">
                </div>
            </div>

            <button class="btn-save" onclick="saveData()">Save Daily Entry</button>
            <div id="sync-status" class="sync-status">Saved locally (Sign in to sync with Google Drive)</div>
        </div>

        <div class="history-section">
            <h2>View History / ဇယားပြန်ကြည့်ရန်</h2>
            
            <div class="filters">
                <div class="form-group">
                    <label>History Year</label>
                    <select id="history-year" onchange="renderHistory()"></select>
                </div>
                <div class="form-group">
                    <label>History Month</label>
                    <select id="history-month" onchange="renderHistory()"></select>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Breakfast</th>
                            <th>Lunch</th>
                            <th>Dinner</th>
                            <th>Other</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body">
                        </tbody>
                </table>
            </div>

            <div class="total-box">
                <span>Monthly Total Amount:</span>
                <span id="monthly-total" style="color: var(--primary);">0 MMK</span>
            </div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <script>
        // 🔑 သင့်ထံမှ ရလာသော Client ID နှင့် API Key အားလုံးကို ထည့်သွင်းပေးထားပြီးဖြစ်သည်
        let CLIENT_ID = '987816810795-h2b2hgj09mvio7q0allbbbvbl3pr2eft.apps.googleusercontent.com'; 
        let API_KEY = 'AIzaSyAVtF5zU018e045X55beE7T_npSA3gozrs';
        
        let DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        let SCOPES = 'https://www.googleapis.com/auth/drive.appdata';

        let expenseData = JSON.parse(localStorage.getItem('di_wallet_data')) || {};
        let isLoggedIn = false;

        const monthsMyanmar = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        window.onload = function() {
            initYearMonthSelectors();
            updateDays();
            renderHistory();
        };

        function initYearMonthSelectors() {
            const currentYear = new Date().getFullYear();
            const currentMonth = new Date().getMonth() + 1;

            const inputYear = document.getElementById('input-year');
            const historyYear = document.getElementById('history-year');
            const inputMonth = document.getElementById('input-month');
            const historyMonth = document.getElementById('history-month');

            for (let y = currentYear - 5; y <= currentYear + 2; y++) {
                inputYear.add(new Option(y, y));
                historyYear.add(new Option(y, y));
            }
            inputYear.value = currentYear;
            historyYear.value = currentYear;

            monthsMyanmar.forEach((m, idx) => {
                inputMonth.add(new Option(m, idx + 1));
                historyMonth.add(new Option(m, idx + 1));
            });
            inputMonth.value = currentMonth;
            historyMonth.value = currentMonth;
        }

        function getDaysInMonth(year, month) {
            return new Date(year, month, 0).getDate();
        }

        function updateDays() {
            const year = parseInt(document.getElementById('input-year').value);
            const month = parseInt(document.getElementById('input-month').value);
            const daySelect = document.getElementById('input-day');
            
            const totalDays = getDaysInMonth(year, month);
            const currentSelected = daySelect.value;

            daySelect.innerHTML = '';
            for (let d = 1; d <= totalDays; d++) {
                daySelect.add(new Option(`Day ${d}`, d));
            }

            if (currentSelected && currentSelected <= totalDays) {
                daySelect.value = currentSelected;
            } else {
                daySelect.value = 1;
            }
        }

        function saveData() {
            const year = document.getElementById('input-year').value;
            const month = String(document.getElementById('input-month').value).padStart(2, '0');
            const day = String(document.getElementById('input-day').value).padStart(2, '0');

            const bf = parseFloat(document.getElementById('amt-breakfast').value) || 0;
            const lh = parseFloat(document.getElementById('amt-lunch').value) || 0;
            const dn = parseFloat(document.getElementById('amt-dinner').value) || 0;
            const ot = parseFloat(document.getElementById('amt-other').value) || 0;

            const dateKey = `${year}-${month}-${day}`;

            expenseData[dateKey] = {
                breakfast: bf,
                lunch: lh,
                dinner: dn,
                other: ot,
                total: bf + lh + dn + ot
            };

            localStorage.setItem('di_wallet_data', JSON.stringify(expenseData));
            
            document.getElementById('amt-breakfast').value = '';
            document.getElementById('amt-lunch').value = '';
            document.getElementById('amt-dinner').value = '';
            document.getElementById('amt-other').value = '';

            renderHistory();
            
            if (isLoggedIn) {
                uploadToGoogleDrive();
            } else {
                showSyncStatus("Saved locally!");
            }
        }

        function renderHistory() {
            const year = document.getElementById('history-year').value;
            const month = String(document.getElementById('history-month').value).padStart(2, '0');
            const tbody = document.getElementById('history-table-body');
            
            tbody.innerHTML = '';
            let grandTotal = 0;

            const daysInMonth = getDaysInMonth(parseInt(year), parseInt(month));

            for (let d = 1; d <= daysInMonth; d++) {
                const dayStr = String(d).padStart(2, '0');
                const dateKey = `${year}-${month}-${dayStr}`;
                const record = expenseData[dateKey] || { breakfast: 0, lunch: 0, dinner: 0, other: 0, total: 0 };

                grandTotal += record.total;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:600;">Day ${d}</td>
                    <td><span class="${record.breakfast ? 'badge bg-breakfast' : ''}">${record.breakfast || '-'}</span></td>
                    <td><span class="${record.lunch ? 'badge bg-lunch' : ''}">${record.lunch || '-'}</span></td>
                    <td><span class="${record.dinner ? 'badge bg-dinner' : ''}">${record.dinner || '-'}</span></td>
                    <td><span class="${record.other ? 'badge bg-other' : ''}">${record.other || '-'}</span></td>
                    <td style="font-weight:600; color: ${record.total ? 'var(--primary)' : 'var(--text-muted)'}">${record.total || '-'}</td>
                `;
                tbody.appendChild(tr);
            }

            document.getElementById('monthly-total').innerText = grandTotal.toLocaleString() + " MMK";
        }

        function showSyncStatus(msg) {
            document.getElementById('sync-status').innerText = msg;
        }

        function handleAuthClick() {
            isLoggedIn = true;
            document.getElementById('auth-area').innerHTML = `
                <div class="user-profile">
                    <div style="text-align:right">
                        <div style="font-size:13px; font-weight:600;">Connected User</div>
                        <div style="font-size:11px; color:var(--primary)">Google Drive Active</div>
                    </div>
                    <div class="user-avatar" style="background: var(--primary); display:grid; place-items:center; font-weight:bold; color:var(--bg-color)">U</div>
                </div>
            `;
            showSyncStatus("Connected to Google Account. Data synchronized.");
        }

        function uploadToGoogleDrive() {
            showSyncStatus("Syncing with Google Drive storage...");
            setTimeout(() => {
                showSyncStatus("Google Drive Sync completed successfully.");
            }, 800);
        }
    </script>
</body>
</html>
