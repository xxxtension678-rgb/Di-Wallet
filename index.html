<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>di-wallet</title>
    <style>
        :root {
            --bg: #090d16;
            --card: #111827;
            --border: #1f2937;
            --text: #f3f4f6;
            --muted: #9ca3af;
            --primary: #38bdf8;
            --accent-bf: #f59e0b;
            --accent-lh: #10b981;
            --accent-dn: #ef4444;
            --accent-ot: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: monospace;
            font-size: 11px;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .logo {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary);
            text-transform: lowercase;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .auth-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: lowercase;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--accent-lh);
        }

        .settings-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 6px;
            border-radius: 4px;
            cursor: pointer;
        }

        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--muted);
            padding: 6px;
            cursor: pointer;
            border-radius: 4px;
            text-transform: lowercase;
        }

        .tab-btn.active {
            background: var(--border);
            color: var(--primary);
            font-weight: bold;
        }

        .view-panel {
            display: none;
        }

        .view-panel.active {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 8px;
        }

        label {
            color: var(--muted);
            text-transform: lowercase;
        }

        select, input {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 6px;
            border-radius: 4px;
            outline: none;
            width: 100%;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .input-bf { border-left: 3px solid var(--accent-bf); }
        .input-lh { border-left: 3px solid var(--accent-lh); }
        .input-dn { border-left: 3px solid var(--accent-dn); }
        .input-ot { border-left: 3px solid var(--accent-ot); }

        .btn-main {
            background: var(--primary);
            color: var(--bg);
            border: none;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            text-transform: lowercase;
            margin-top: 4px;
        }

        .table-wrapper {
            overflow-x: hidden;
            margin-top: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 4px 2px;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--muted);
            font-weight: normal;
        }

        .col-date { width: 14%; }
        .col-amt { width: 16%; text-align: right; }
        .col-tot { width: 20%; text-align: right; font-weight: bold; }

        .txt-bf { color: var(--accent-bf); }
        .txt-lh { color: var(--accent-lh); }
        .txt-dn { color: var(--accent-dn); }
        .txt-ot { color: var(--accent-ot); }

        .total-box {
            display: flex;
            justify-content: space-between;
            background: var(--bg);
            padding: 6px;
            border-radius: 4px;
            border: 1px solid var(--border);
            margin-top: 6px;
            font-weight: bold;
        }

        .status-bar {
            font-size: 10px;
            color: var(--muted);
            text-align: center;
            text-transform: lowercase;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            padding: 10px;
            z-index: 100;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 100%;
            max-width: 440px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--accent-dn);
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">di-wallet</div>
            <div class="header-actions">
                <div id="auth-status">
                    <button class="auth-btn" id="login-btn" onclick="handleAuthClick()" style="display:none;">login</button>
                </div>
                <button class="settings-btn" onclick="toggleModal(true)">⚙️</button>
            </div>
        </header>

        <div class="tabs">
            <button id="tab-input" class="tab-btn active" onclick="switchTab('input')">input</button>
            <button id="tab-month" class="tab-btn" onclick="switchTab('month')">this month</button>
        </div>

        <div id="panel-input" class="view-panel active">
            <div class="card">
                <div class="form-group">
                    <label>day (ရက်စွဲ)</label>
                    <select id="inp-day"></select>
                </div>
                <div class="grid-inputs">
                    <div class="form-group">
                        <label class="txt-bf">breakfast</label>
                        <input type="number" id="inp-bf" class="input-bf" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="txt-lh">lunch</label>
                        <input type="number" id="inp-lh" class="input-lh" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="txt-dn">dinner</label>
                        <input type="number" id="inp-dn" class="input-dn" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="txt-ot">other</label>
                        <input type="number" id="inp-ot" class="input-ot" placeholder="0">
                    </div>
                </div>
                <button class="btn-main" onclick="saveTodayEntry()">save entry</button>
            </div>
            <div id="sync-info" class="status-bar">initializing google API...</div>
        </div>

        <div id="panel-month" class="view-panel">
            <div class="card">
                <span id="month-title" style="font-weight: bold; color: var(--primary);"></span>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th class="col-date">date</th>
                                <th class="col-amt txt-bf">bf</th>
                                <th class="col-amt txt-lh">lh</th>
                                <th class="col-amt txt-dn">dn</th>
                                <th class="col-amt txt-ot">ot</th>
                                <th class="col-tot">total</th>
                            </tr>
                        </thead>
                        <tbody id="month-table-body"></tbody>
                    </table>
                </div>
                <div class="total-box">
                    <span>total:</span>
                    <span id="month-total-amt" style="color: var(--primary);">0</span>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span style="font-weight: bold; color: var(--primary);">settings / history archive</span>
                <button class="close-btn" onclick="toggleModal(false)">✕</button>
            </div>
            
            <div class="card" style="padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <div class="form-group" style="margin:0;">
                    <label>year</label>
                    <select id="hist-year" onchange="renderHistory()"></select>
                </div>
                <div class="form-group" style="margin:0;">
                    <label>month</label>
                    <select id="hist-month" onchange="renderHistory()"></select>
                </div>
            </div>

            <div class="card" style="flex: 1; max-height: 280px; overflow-y: auto; padding: 8px;">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th class="col-date">date</th>
                                <th class="col-amt txt-bf">bf</th>
                                <th class="col-amt txt-lh">lh</th>
                                <th class="col-amt txt-dn">dn</th>
                                <th class="col-amt txt-ot">ot</th>
                                <th class="col-tot">total</th>
                            </tr>
                        </thead>
                        <tbody id="hist-table-body"></tbody>
                    </table>
                </div>
                <div class="total-box">
                    <span>selected month total:</span>
                    <span id="hist-total-amt" style="color: var(--primary);">0</span>
                </div>
            </div>
        </div>
    </div>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        const CLIENT_ID = '987816810795-h2b2hgj09mvio7q0allbbbvbl3pr2eft.apps.googleusercontent.com'; 
        const API_KEY = 'AIzaSyAVtF5zU018e045X55beE7T_npSA3gozrs';
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
        
        let expenseData = JSON.parse(localStorage.getItem('di_wallet_data')) || {};
        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        let backupFileId = null;

        window.onload = function() {
            initSelectors();
            setupDayDropdown();
            renderCurrentMonthTable();
        };

        function initSelectors() {
            const currentYear = new Date().getFullYear();
            const ySelect = document.getElementById('hist-year');
            const mSelect = document.getElementById('hist-month');

            for (let y = currentYear - 3; y <= currentYear + 1; y++) {
                ySelect.add(new Option(y, y));
            }
            ySelect.value = currentYear;

            for (let m = 1; m <= 12; m++) {
                mSelect.add(new Option(String(m).padStart(2, '0'), String(m).padStart(2, '0')));
            }
            mSelect.value = String(new Date().getMonth() + 1).padStart(2, '0');
        }

        function setupDayDropdown() {
            const now = new Date();
            const totalDays = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const daySelect = document.getElementById('inp-day');
            daySelect.innerHTML = '';
            for (let d = 1; d <= totalDays; d++) {
                daySelect.add(new Option(`day ${d}`, d));
            }
            daySelect.value = now.getDate();
        }

        function switchTab(tab) {
            document.getElementById('tab-input').classList.remove('active');
            document.getElementById('tab-month').classList.remove('active');
            document.getElementById('panel-input').classList.remove('active');
            document.getElementById('panel-month').classList.remove('active');

            if (tab === 'input') {
                document.getElementById('tab-input').classList.add('active');
                document.getElementById('panel-input').classList.add('active');
            } else {
                document.getElementById('tab-month').classList.add('active');
                document.getElementById('panel-month').classList.add('active');
                renderCurrentMonthTable();
            }
        }

        function toggleModal(show) {
            const modal = document.getElementById('settings-modal');
            if (show) {
                modal.classList.add('active');
                renderHistory();
            } else {
                modal.classList.remove('active');
            }
        }

        function saveTodayEntry() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(document.getElementById('inp-day').value).padStart(2, '0');
            
            const key = `${year}-${month}-${day}`;
            
            const bf = parseFloat(document.getElementById('inp-bf').value) || 0;
            const lh = parseFloat(document.getElementById('inp-lh').value) || 0;
            const dn = parseFloat(document.getElementById('inp-dn').value) || 0;
            const ot = parseFloat(document.getElementById('inp-ot').value) || 0;

            expenseData[key] = { bf, lh, dn, ot, tot: bf + lh + dn + ot };
            localStorage.setItem('di_wallet_data', JSON.stringify(expenseData));

            document.getElementById('inp-bf').value = '';
            document.getElementById('inp-lh').value = '';
            document.getElementById('inp-dn').value = '';
            document.getElementById('inp-ot').value = '';

            updateSyncStatus("saved locally!");
            if (gapi.client.getToken()) {
                uploadToCloud();
            }
        }

        function renderCurrentMonthTable() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            document.getElementById('month-title').innerText = `current month: ${year}-${month}`;
            buildTable(year, month, 'month-table-body', 'month-total-amt');
        }

        function renderHistory() {
            const year = document.getElementById('hist-year').value;
            const month = document.getElementById('hist-month').value;
            buildTable(year, month, 'hist-table-body', 'hist-total-amt');
        }

        function buildTable(year, month, tbodyId, totalId) {
            const tbody = document.getElementById(tbodyId);
            tbody.innerHTML = '';
            let grandTotal = 0;
            const totalDays = new Date(year, parseInt(month), 0).getDate();

            for (let d = 1; d <= totalDays; d++) {
                const dayStr = String(d).padStart(2, '0');
                const key = `${year}-${month}-${dayStr}`;
                const r = expenseData[key];

                if (r && r.tot > 0) {
                    grandTotal += r.tot;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="col-date">${dayStr}</td>
                        <td class="col-amt txt-bf">${r.bf || '-'}</td>
                        <td class="col-amt txt-lh">${r.lh || '-'}</td>
                        <td class="col-amt txt-dn">${r.dn || '-'}</td>
                        <td class="col-amt txt-ot">${r.ot || '-'}</td>
                        <td class="col-tot">${r.tot}</td>
                    `;
                    tbody.appendChild(tr);
                }
            }
            document.getElementById(totalId).innerText = grandTotal.toLocaleString();
        }

        function updateSyncStatus(msg) {
            document.getElementById('sync-info').innerText = msg;
        }

        /* --- ☁️ Correct Official Google Drive API Client Logic --- */
        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            await gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: [DISCOVERY_DOC],
            });
            gapiInited = true;
            maybeEnableButtons();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                ux_mode: 'popup',
                callback: '', // defined dynamically during invocation
            });
            gisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gisInited) {
                document.getElementById('login-btn').style.display = 'block';
                updateSyncStatus("local storage mode (ready to sync)");
            }
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    throw (resp);
                }
                document.getElementById('auth-status').innerHTML = '<div class="user-info">☁️ cloud synced</div>';
                await syncWithCloud();
            };

            if (gapi.client.getToken() === null) {
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        async function syncWithCloud() {
            updateSyncStatus("searching cloud backup...");
            try {
                let response = await gapi.client.drive.files.list({
                    q: "name='di_wallet_backup.json' and spaces='appDataFolder'",
                    spaces: 'appDataFolder',
                    fields: 'files(id, name)'
                });
                
                let files = response.result.files;
                if (files && files.length > 0) {
                    backupFileId = files[0].id;
                    updateSyncStatus("downloading cloud data...");
                    
                    let fileRes = await gapi.client.drive.files.get({
                        fileId: backupFileId,
                        alt: 'media'
                    });
                    
                    let cloudData = fileRes.result;
                    if (cloudData) {
                        expenseData = Object.assign(cloudData, expenseData);
                        localStorage.setItem('di_wallet_data', JSON.stringify(expenseData));
                        renderCurrentMonthTable();
                    }
                }
                await uploadToCloud();
            } catch (err) {
                console.error(err);
                updateSyncStatus("cloud sync failed.");
            }
        }

        async function uploadToCloud() {
            updateSyncStatus("uploading backup...");
            try {
                if (backupFileId) {
                    // Update existing backup
                    await gapi.client.request({
                        path: '/upload/drive/v3/files/' + backupFileId,
                        method: 'PATCH',
                        params: { uploadType: 'media' },
                        body: JSON.stringify(expenseData)
                    });
                } else {
                    // Create new file metadata inside appDataFolder
                    let metadata = {
                        name: 'di_wallet_backup.json',
                        parents: ['appDataFolder']
                    };
                    
                    let response = await gapi.client.drive.files.create({
                        resource: metadata,
                        fields: 'id'
                    });
                    
                    backupFileId = response.result.id;
                    
                    // Upload the payload media
                    await gapi.client.request({
                        path: '/upload/drive/v3/files/' + backupFileId,
                        method: 'PATCH',
                        params: { uploadType: 'media' },
                        body: JSON.stringify(expenseData)
                    });
                }
                updateSyncStatus("cloud storage active (all backup synced)");
            } catch (e) {
                console.error(e);
                updateSyncStatus("backup update failed.");
            }
        }
    </script>
</body>
</html>
