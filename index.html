<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>di-wallet</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg-color: #0f0f11;
      --surface-color: #16161a;
      --surface-card: #202024;
      --primary-color: #a87ffb;
      --secondary-color: #3dd6ba;
      --text-color: #e3e3e6;
      --text-dim: #888891;
      --border-color: #2a2a30;
      --error-color: #ff6b6b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: monospace;
      text-transform: lowercase;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .phone-container {
      width: 100%;
      max-width: 412px; /* standard mobile view width */
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.7);
      position: relative;
      overflow: hidden;
    }

    /* Header component */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .app-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--text-color);
      letter-spacing: -0.5px;
    }

    .settings-trigger {
      background: var(--surface-card);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
    }

    .settings-trigger:hover {
      background: var(--border-color);
    }

    /* Screen display control */
    .screen { display: none; }
    .screen.active { display: block; }

    /* Auth View styling */
    .auth-screen {
      text-align: center;
      padding: 60px 0;
    }

    /* Inputs and Forms styling (Reference 426/427 style) */
    .input-field {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface-card);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      font-family: monospace;
      border-radius: 12px;
      outline: none;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      border-color: var(--primary-color);
    }

    /* Display Widgets / Cards */
    .status-widget {
      background: var(--surface-card);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border-color);
    }

    .widget-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .widget-row:last-child { margin-bottom: 0; }
    .widget-label { color: var(--text-dim); }
    .widget-value { font-weight: bold; }

    /* Custom Grid Layout from Sketch */
    .meal-grid {
      background: var(--surface-card);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
    }

    .grid-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .grid-row:last-child { margin-bottom: 0; }
    .grid-label { color: var(--text-color); }

    /* Premium Overlay Panel (Reference 429/430 menu style) */
    .overlay-menu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 15, 17, 0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
      padding: 24px;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      border-radius: 24px;
    }

    .overlay-menu.open {
      transform: translateY(0);
    }

    .overlay-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-item {
      background: var(--surface-card);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 14px 20px;
      border-radius: 14px;
      cursor: pointer;
      text-align: left;
      font-family: monospace;
      font-size: 1rem;
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .menu-item:hover {
      background: var(--border-color);
      border-color: var(--primary-color);
    }

    /* Buttons styling */
    .btn-main {
      background: var(--primary-color);
      color: var(--bg-color);
      border: none;
      padding: 14px;
      font-family: monospace;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      border-radius: 14px;
      width: 100%;
      transition: opacity 0.2s;
    }

    .btn-main:hover { opacity: 0.9; }
    
    .btn-close {
      background: none;
      border: none;
      color: var(--text-color);
      font-size: 1.5rem;
      cursor: pointer;
    }

    /* Records inside history view */
    .record-item {
      background: var(--surface-card);
      border: 1px solid var(--border-color);
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <div class="phone-container">

    <div id="settings-overlay" class="overlay-menu">
      <div class="overlay-header">
        <span class="app-title">settings</span>
        <button id="btn-close-menu" class="btn-close">&times;</button>
      </div>
      <div class="menu-list">
        <button class="menu-item" id="menu-current"><span>&bull; current month</span> <span>&rarr;</span></button>
        <button class="menu-item" id="menu-history"><span>&bull; history archive</span> <span>&rarr;</span></button>
        <button class="menu-item" id="menu-theme"><span>&bull; theme (dark)</span></button>
        <button class="menu-item" id="menu-logout" style="color: var(--error-color);"><span>&bull; log out</span></button>
      </div>
    </div>

    <div id="auth-screen" class="screen active">
      <div class="auth-screen">
        <div class="app-title" style="font-size: 2rem; margin-bottom: 12px;">di-wallet</div>
        <p style="color: var(--text-dim); margin-bottom: 40px;">minimalist financial logs.</p>
        <button id="btn-login" class="btn-main">sign in with google</button>
      </div>
    </div>

    <div id="app-screen" class="screen">
      
      <div class="header">
        <span class="app-title" id="app-view-title">di-wallet</span>
        <button id="btn-trigger-settings" class="settings-trigger">⚙️</button>
      </div>

      <div id="main-view">
        
        <div class="status-widget">
          <div class="widget-row">
            <span class="widget-label">balance</span>
            <span class="widget-value" id="dash-balance" style="color: var(--secondary-color);">0</span>
          </div>
          <div class="widget-row">
            <span class="widget-label">date</span>
            <span class="widget-value" id="dash-date">--/--/----</span>
          </div>
        </div>

        <div style="margin-bottom: 20px; display: flex; gap: 8px;">
          <input type="number" id="input-budget" class="input-field" placeholder="set monthly income">
          <button id="btn-save-budget" class="btn-main" style="width: auto; padding: 0 20px;">save</button>
        </div>

        <div class="meal-grid">
          <div class="grid-row">
            <span class="grid-label">breakfast</span>
            <input type="number" id="amount-breakfast" class="input-field" placeholder="0" data-desc="breakfast">
          </div>
          <div class="grid-row">
            <span class="grid-label">lunch</span>
            <input type="number" id="amount-lunch" class="input-field" placeholder="0" data-desc="lunch">
          </div>
          <div class="grid-row">
            <span class="grid-label">dinner</span>
            <input type="number" id="amount-dinner" class="input-field" placeholder="0" data-desc="dinner">
          </div>
          <div class="grid-row">
            <span class="grid-label">other</span>
            <input type="number" id="amount-other" class="input-field" placeholder="0" data-desc="other">
          </div>
        </div>

        <button id="btn-save-grid" class="btn-main">save transactions</button>
      </div>

      <div id="history-view" class="screen">
        <div style="display: flex; gap: 8px; margin-bottom: 16px;">
          <select id="history-year" class="input-field" style="flex: 1;">
            <option value="2026" selected>2026</option>
            <option value="2027">2027</option>
          </select>
          <select id="history-month" class="input-field" style="flex: 1;"></select>
          <button id="btn-search-history" class="btn-main" style="width: auto; padding: 0 16px;">fetch</button>
        </div>

        <div class="status-widget" style="background: rgba(255,255,255,0.02)">
          <div class="widget-row">
            <span class="widget-label">archive income</span>
            <span id="hist-dash-budget">0</span>
          </div>
          <div class="widget-row">
            <span class="widget-label">archive total expense</span>
            <span id="hist-dash-expense" style="color: var(--error-color);">0</span>
          </div>
        </div>

        <div id="history-records-container" style="margin-top: 16px; max-height: 250px; overflow-y: auto;">
          </div>
      </div>

    </div>
  </div>

  <script>
    // ----------------------------------------------------
    // INJECTED FIREBASE CONFIGURATION (di-wallet-v1)
    // ----------------------------------------------------
    const firebaseConfig = {
      apiKey: "AIzaSyB7MTBBQLivq0vfixtXa8CLEIROUeebXGw",
      authDomain: "di-wallet-v1.firebaseapp.com",
      projectId: "di-wallet-v1",
      storageBucket: "di-wallet-v1.firebasestorage.app",
      messagingSenderId: "393481838636",
      appId: "1:393481838636:web:60c0ec092c7fea0c823189",
      measurementId: "G-EYGRQCDKQG"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    let currentUser = null;
    let today = new Date();
    let currentYear = today.getFullYear();
    let currentMonth = today.getMonth() + 1;
    
    const monthNames = ["january", "february", "march", "april", "may", "june", "july", "august", "september", "october", "november", "december"];

    // Element States Mapping
    const settingsOverlay = document.getElementById('settings-overlay');
    const authScreen = document.getElementById('auth-screen');
    const appScreen = document.getElementById('app-screen');
    const mainView = document.getElementById('main-view');
    const historyView = document.getElementById('history-view');
    const appViewTitle = document.getElementById('app-view-title');

    // UI Trigger Functions
    document.getElementById('btn-trigger-settings').addEventListener('click', () => settingsOverlay.classList.add('open'));
    document.getElementById('btn-close-menu').addEventListener('click', () => settingsOverlay.classList.remove('open'));

    document.getElementById('menu-current').addEventListener('click', () => {
      settingsOverlay.classList.remove('open');
      historyView.classList.remove('active');
      mainView.style.display = 'block';
      appViewTitle.textContent = "di-wallet";
    });

    document.getElementById('menu-history').addEventListener('click', () => {
      settingsOverlay.classList.remove('open');
      mainView.style.display = 'none';
      historyView.classList.add('active');
      appViewTitle.textContent = "archive";
    });

    document.getElementById('menu-logout').addEventListener('click', () => {
      settingsOverlay.classList.remove('open');
      auth.signOut();
    });

    // Run-time Engine
    function init() {
      document.getElementById('dash-date').textContent = `${today.getDate()}/${currentMonth}/${currentYear}`;
      
      // Setup Month Options
      const monthSelect = document.getElementById('history-month');
      monthNames.forEach((name, i) => {
        const opt = document.createElement('option');
        opt.value = i + 1;
        opt.textContent = name;
        if (i + 1 === currentMonth) opt.selected = true;
        monthSelect.appendChild(opt);
      });

      auth.onAuthStateChanged(user => {
        if (user) {
          currentUser = user;
          authScreen.classList.remove('active');
          appScreen.classList.add('active');
          syncCurrentMonthData();
        } else {
          currentUser = null;
          appScreen.classList.remove('active');
          authScreen.classList.add('active');
        }
      });
    }

    document.getElementById('btn-login').addEventListener('click', () => auth.signInWithPopup(provider));

    function getMonthDocRef(year, month) {
      return db.collection('users').doc(currentUser.uid)
               .collection('years').doc(String(year))
               .collection('months').doc(String(month).padStart(2, '0'));
    }

    function syncCurrentMonthData() {
      if (!currentUser) return;
      getMonthDocRef(currentYear, currentMonth).onSnapshot(doc => {
        let budget = 0;
        let expenses = [];
        if (doc.exists) {
          budget = doc.data().budget || 0;
          expenses = doc.data().expenses || [];
        }
        document.getElementById('input-budget').value = budget;
        
        let totalExpense = expenses.reduce((sum, item) => sum + item.amount, 0);
        document.getElementById('dash-balance').textContent = budget - totalExpense;
      });
    }

    document.getElementById('btn-save-budget').addEventListener('click', () => {
      const budgetVal = parseFloat(document.getElementById('input-budget').value) || 0;
      getMonthDocRef(currentYear, currentMonth).set({ budget: budgetVal }, { merge: true })
        .then(() => alert('income updated.'));
    });

    document.getElementById('btn-save-grid').addEventListener('click', () => {
      if (!currentUser) return;
      
      const inputs = ['breakfast', 'lunch', 'dinner', 'other'];
      let batchTransactions = [];
      let nowStr = new Date().toISOString();

      inputs.forEach(id => {
        const el = document.getElementById(`amount-${id}`);
        const val = parseFloat(el.value) || 0;
        if (val > 0) {
          batchTransactions.push({
            id: `${Date.now()}-${id}`,
            day: today.getDate(),
            amount: val,
            desc: id,
            createdAt: nowStr
          });
        }
      });

      if (batchTransactions.length === 0) return alert('please fill at least one row.');

      getMonthDocRef(currentYear, currentMonth).set({
        expenses: firebase.firestore.FieldValue.arrayUnion(...batchTransactions)
      }, { merge: true }).then(() => {
        inputs.forEach(id => document.getElementById(`amount-${id}`).value = '');
        alert('statements logged safely.');
      });
    });

    // History Fetcher
    document.getElementById('btn-search-history').addEventListener('click', () => {
      const y = document.getElementById('history-year').value;
      const m = String(document.getElementById('history-month').value).padStart(2, '0');
      const container = document.getElementById('history-records-container');

      db.collection('users').doc(currentUser.uid)
        .collection('years').doc(y)
        .collection('months').doc(m).get().then(doc => {
          container.innerHTML = '';
          let budget = 0, expenses = [];
          if (doc.exists) {
            budget = doc.data().budget || 0;
            expenses = doc.data().expenses || [];
          }
          document.getElementById('hist-dash-budget').textContent = budget;
          let total = expenses.reduce((sum, item) => sum + item.amount, 0);
          document.getElementById('hist-dash-expense').textContent = total;

          expenses.sort((a,b) => a.day - b.day).forEach(item => {
            const div = document.createElement('div');
            div.className = 'record-item';
            div.innerHTML = `<span>day ${item.day}: ${item.desc}</span><span>${item.amount}</span>`;
            container.appendChild(div);
          });
        });
    });

    window.onload = init;
  </script>
</body>
</html>
