<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>di-wallet // glassmorphism dark</title>
    <style>
        /* Glassmorphism Dark Mode Styling (Inspired by 412.jpg & 413.jpg) */
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            
            /* Clean category indicator accents */
            --color-bf: #38bdf8;
            --color-lh: #34d399;
            --color-dn: #f87171;
            --color-ot: #c084fc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            letter-spacing: -0.3px;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Glassmorphic Panel Base */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Header Style */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-main);
            text-transform: lowercase;
            position: relative;
        }
        .logo::after {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--color-bf);
            border-radius: 50%;
            margin-left: 4px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Smooth Glass Buttons */
        .btn-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            text-transform: lowercase;
            transition: all 0.2s ease;
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--glass-highlight);
        }

        .user-info {
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: #34d399;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            text-transform: lowercase;
        }

        /* Tabs Section (Inspired by 414.jpg) */
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            text-transform: lowercase;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--glass-highlight);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .view-panel {
            display: none;
        }

        .view-panel.active {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Form Controls */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 14px;
        }

        label {
            color: var(--text-muted);
            text-transform: lowercase;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
        }

        select, input {
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 10px;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }
        select:focus, input:focus {
            border-color: var(--glass-highlight);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-submit {
            background: var(--text-main);
            color: #0f172a;
            border: none;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            text-transform: lowercase;
            transition: opacity 0.2s;
            margin-top: 4px;
        }
        .btn-submit:block {
            opacity: 0.9;
        }

        /* Table & Lists View */
        .table-wrapper {
            overflow-x: hidden;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--glass-border);
            text-transform: lowercase;
        }

        th {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            font-weight: normal;
        }

        .col-date { width: 15%; text-align: center; color: var(--text-muted); }
        .col-amt { width: 17%; text-align: right; }
        .col-tot { width: 19%; text-align: right; font-weight: bold; }

        .total-box {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px;
            margin-top: 12px;
            text-transform: lowercase;
        }

        .status-bar {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            text-transform: lowercase;
            padding: 4px;
        }

        /* Overlay Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            padding: 15px;
            z-index: 100;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header Section -->
        <header class="glass-panel">
            <div class="logo">di-wallet</div>
            <div class="header-actions">
                <div id="auth-status">
                    <button class="btn-glass" onclick="initiateGoogleLogin()">connect account</button>
                </div>
                <button class="btn-glass" style="padding: 6px 8px;" onclick="toggleModal(true)">⚙️</button>
            </div>
        </header>

        <!-- Segmented Tabs -->
        <div class="tabs">
            <button id="tab-input" class="tab-btn active" onclick="switchTab('input')">input</button>
            <button id="tab-month" class="tab-btn" onclick="switchTab('month')">history</button>
        </div>

        <!-- Input Panel -->
        <div id="panel-input" class="view-panel active">
            <div class="glass-panel">
                <div class="form-group">
                    <label>select date</label>
                    <select id="inp-day"></select>
                </div>
                <div class="grid-inputs">
                    <div class="form-group">
                        <label><span class="dot" style="background: var(--color-bf);"></span>breakfast</label>
                        <input type="number" id="inp-bf" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label><span class="dot" style="background: var(--color-lh);"></span>lunch</label>
                        <input type="number" id="inp-lh" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label><span class="dot" style="background: var(--color-dn);"></span>dinner</label>
                        <input type="number" id="inp-dn" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label><span class="dot" style="background: var(--color-ot);"></span>other</label>
                        <input type="number" id="inp-ot" placeholder="0">
                    </div>
                </div>
                <button class="btn-submit" onclick="saveTodayEntry()">save entry log</button>
            </div>
            <div id="sync-info" class="status-bar">system stream online...</div>
        </div>

        <!-- History Panel -->
        <div id="panel-month" class="view-panel">
            <div class="glass-panel">
                <div id="month-title" style="text-transform: lowercase; margin-bottom: 10px; color: var(--text-muted);"></div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th class="col-date">day</th>
                                <th class="col-amt">bf</th>
                                <th class="col-amt">lh</th>
                                <th class="col-amt">dn</th>
                                <th class="col-amt">ot</th>
                                <th class="col-tot">tot</th>
                            </tr>
                        </thead>
                        <tbody id="month-table-body"></tbody>
                    </table>
                </div>
                <div class="total-box">
                    <span>grand total:</span>
                    <span id="month-total-amt" style="font-weight: bold; color: var(--color-bf);">0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Filter Modal -->
    <div id="settings-modal" class="modal">
        <div class="glass-panel modal-content">
            <div class="modal-header">
                <span style="text-transform: lowercase; color: var(--text-muted);">archive filters</span>
                <span style="cursor: pointer; color: var(--text-muted);" onclick="toggleModal(false)">✕</span>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label>year</label>
                    <select id="hist-year" onchange="renderHistory()"></select>
                </div>
                <div class="form-group">
                    <label>month</label>
                    <select id="hist-month" onchange="renderHistory()"></select>
                </div>
            </div>

            <div class="table-wrapper" style="max-height: 200px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr>
                            <th class="col-date">day</th>
                            <th class="col-amt">bf</th>
                            <th class="col-amt">lh</th>
                            <th class="col-amt">dn</th>
                            <th class="col-amt">ot</th>
                            <th class="col-tot">tot</th>
                        </tr>
                    </thead>
                    <tbody id="hist-table-body"></tbody>
                </table>
            </div>
            <div class="total-box">
                <span>filter total:</span>
                <span id="hist-total-amt" style="font-weight: bold; color: var(--color-lh);">0</span>
            </div>
        </div>
    </div>

    <!-- Core App Logic & Secure Cloud Handler -->
    <script>
        const CLIENT_ID = '987816810795-h2b2hgj09mvio7q0allbbbvbl3pr2eft.apps.googleusercontent.com'; 
        const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
        
        let expenseData = JSON.parse(localStorage.getItem('di_wallet_data')) || {};
        let backupFileId = null;
        let accessToken = localStorage.getItem('google_access_token') || null;

        window.onload = function() {
            initSelectors();
            setupDayDropdown();
            renderCurrentMonthTable();
            checkUrlForToken();
            
            if (accessToken) {
                document.getElementById('auth-status').innerHTML = '<div class="user-info">connected</div>';
                updateSyncStatus("streaming cloud index...");
                syncWithCloud();
            }
        };

        function initiateGoogleLogin() {
            const redirectUri = window.location.href.split('#')[0].split('?')[0];
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
                            `client_id=${encodeURIComponent(CLIENT_ID)}&` +
                            `redirect_uri=${encodeURIComponent(redirectUri)}&` +
                            `response_type=token&` +
                            `scope=${encodeURIComponent(SCOPES)}&` +
                            `include_granted_scopes=true&` +
                            `prompt=consent`;
            window.location.href = authUrl;
        }

        function checkUrlForToken() {
            const hash = window.location.hash;
            if (hash && hash.includes('access_token')) {
                const params = new URLSearchParams(hash.substring(1));
                accessToken = params.get('access_token');
                localStorage.setItem('google_access_token', accessToken);
                window.history.replaceState({}, document.title, window.location.pathname);
                document.getElementById('auth-status').innerHTML = '<div class="user-info">connected</div>';
                syncWithCloud();
            }
        }

        async function syncWithCloud() {
            if (!accessToken) return;
            updateSyncStatus("validating application folder pointer...");
            try {
                let listRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent("name='di_wallet_backup.json' and spaces='appDataFolder'")}&spaces=appDataFolder`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                let listData = await listRes.json();
                
                if (listData.files && listData.files.length > 0) {
                    backupFileId = listData.files[0].id;
                    updateSyncStatus("merging sync stream packet...");
                    
                    let fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${backupFileId}?alt=media`, {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    let cloudData = await fileRes.json();
                    if (cloudData) {
                        expenseData = Object.assign(cloudData, expenseData);
                        localStorage.setItem('di_wallet_data', JSON.stringify(expenseData));
                        renderCurrentMonthTable();
                    }
                }
                await uploadToCloud();
            } catch (err) {
                console.error(err);
                updateSyncStatus("handshake lost. re-auth required.");
                localStorage.removeItem('google_access_token');
            }
        }

        async function uploadToCloud() {
            if (!accessToken) return;
            updateSyncStatus("pushing layout array data...");
            try {
                if (backupFileId) {
                    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${backupFileId}?uploadType=media`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(expenseData)
                    });
                } else {
                    let metadata = { name: 'di_wallet_backup.json', parents: ['appDataFolder'] };
                    let createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(metadata)
                    });
                    let createData = await createRes.json();
                    backupFileId = createData.id;
                    
                    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${backupFileId}?uploadType=media`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(expenseData)
                    });
                }
                updateSyncStatus("cloud state: optimal & secured");
            } catch (e) {
                console.error(e);
                updateSyncStatus("cloud sync update failed.");
            }
        }

        function initSelectors() {
            const currentYear = new Date().getFullYear();
            const ySelect = document.getElementById('hist-year');
            const mSelect = document.getElementById('hist-month');

            for (let y = currentYear - 3; y <= currentYear + 1; y++) {
                ySelect.add(new Option(y, y));
            }
            ySelect.value = currentYear;

            for (let m = 1; m <= 12; m++) {
                mSelect.add(new Option(String(m).padStart(2, '0'), String(m).padStart(2, '0')));
            }
            mSelect.value = String(new Date().getMonth() + 1).padStart(2, '0');
        }

        function setupDayDropdown() {
            const now = new Date();
            const totalDays = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const daySelect = document.getElementById('inp-day');
            daySelect.innerHTML = '';
            for (let d = 1; d <= totalDays; d++) {
                daySelect.add(new Option(`day ${String(d).padStart(2, '0')}`, d));
            }
            daySelect.value = now.getDate();
        }

        function switchTab(tab) {
            document.getElementById('tab-input').classList.remove('active');
            document.getElementById('tab-month').classList.remove('active');
            document.getElementById('panel-input').classList.remove('active');
            document.getElementById('panel-month').classList.remove('active');

            if (tab === 'input') {
                document.getElementById('tab-input').classList.add('active');
                document.getElementById('panel-input').classList.add('active');
            } else {
                document.getElementById('tab-month').classList.add('active');
                document.getElementById('panel-month').classList.add('active');
                renderCurrentMonthTable();
            }
        }

        function toggleModal(show) {
            const modal = document.getElementById('settings-modal');
            if (show) {
                modal.classList.add('active');
                renderHistory();
            } else {
                modal.classList.remove('active');
            }
        }

        function saveTodayEntry() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(document.getElementById('inp-day').value).padStart(2, '0');
            const key = `${year}-${month}-${day}`;
            
            const bf = parseFloat(document.getElementById('inp-bf').value) || 0;
            const lh = parseFloat(document.getElementById('inp-lh').value) || 0;
            const dn = parseFloat(document.getElementById('inp-dn').value) || 0;
            const ot = parseFloat(document.getElementById('inp-ot').value) || 0;

            expenseData[key] = { bf, lh, dn, ot, tot: bf + lh + dn + ot };
            localStorage.setItem('di_wallet_data', JSON.stringify(expenseData));

            document.getElementById('inp-bf').value = '';
            document.getElementById('inp-lh').value = '';
            document.getElementById('inp-dn').value = '';
            document.getElementById('inp-ot').value = '';

            updateSyncStatus("local packet mapped successfully.");
            if (accessToken) {
                uploadToCloud();
            }
        }

        function renderCurrentMonthTable() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            document.getElementById('month-title').innerText = `active index: ${year}-${month}`;
            buildTable(year, month, 'month-table-body', 'month-total-amt');
        }

        function renderHistory() {
            const year = document.getElementById('hist-year').value;
            const month = document.getElementById('hist-month').value;
            buildTable(year, month, 'hist-table-body', 'hist-total-amt');
        }

        function buildTable(year, month, tbodyId, totalId) {
            const tbody = document.getElementById(tbodyId);
            tbody.innerHTML = '';
            let grandTotal = 0;
            const totalDays = new Date(year, parseInt(month), 0).getDate();

            for (let d = 1; d <= totalDays; d++) {
                const dayStr = String(d).padStart(2, '0');
                const key = `${year}-${month}-${dayStr}`;
                const r = expenseData[key];

                if (r && r.tot > 0) {
                    grandTotal += r.tot;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="col-date">${dayStr}</td>
                        <td class="col-amt">${r.bf || '-'}</td>
                        <td class="col-amt">${r.lh || '-'}</td>
                        <td class="col-amt">${r.dn || '-'}</td>
                        <td class="col-amt">${r.ot || '-'}</td>
                        <td class="col-tot">${r.tot}</td>
                    `;
                    tbody.appendChild(tr);
                }
            }
            document.getElementById(totalId).innerText = grandTotal.toLocaleString();
        }

        function updateSyncStatus(msg) {
            document.getElementById('sync-info').innerText = `>> system: ${msg}`;
        }
    </script>
</body>
</html>
